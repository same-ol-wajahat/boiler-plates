<VirtualHost *:8000>
    DocumentRoot /srv/app/public
    PassEnv $DD_ENV
    PassEnv $DD_SERVICE
    PassEnv $DD_VERSION

    <Directory "/srv/app/public">
        AllowOverride all
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>