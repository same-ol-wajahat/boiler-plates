services: 
  example-app:    
  # build:
  #   context: .
  #   dockerfile: Dockerfile
    image: ${IMAGE}
    container_name: example
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file:
      - path: ./.env
        format: raw
        required: true
    working_dir: /srv/app
    tty: true
    environment:
      SERVICE_NAME: example-app
      SERVICE_TAGS: dev
    labels:
      - traefik.enable=true
        #      - traefik.http.routers.api-http.rule=Host(`test.example.com`)
        #      - traefik.http.routers.api-http.entrypoints=web
        #      - traefik.http.services.api-http.loadbalancer.server.port=8000
      - traefik.http.routers.api-https.tls=true
      - traefik.http.routers.api-https.tls.certresolver=route53
      - traefik.http.routers.api-https.entrypoints=websecure
      - traefik.http.routers.api-https.rule=Host(`stage-example.example.com`)
      - traefik.http.services.api-https.loadbalancer.server.port=8000
    # volumes:
    #   - ./:/srv/app
    networks:
      - traefik


networks:
  traefik:
    external: true

volumes:
  dbdata: